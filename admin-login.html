<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OnboardFlow | Acceso</title><style>:root{--navy:#0B132B;--ivory:#FAF8F2;--copper:#C9782A;--muted:#667085;--display:Georgia,serif;--body:Inter,system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(145deg,var(--navy),#1b294d);font-family:var(--body);padding:18px}.card{width:min(480px,100%);background:white;border-radius:28px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.25)}.brand{font-family:var(--display);font-size:26px;color:var(--navy)}h1{font-family:var(--display);font-size:38px;color:var(--navy);margin:28px 0 6px}.sub{color:var(--muted)}label{display:block;font-size:13px;font-weight:800;margin:16px 0 6px}input{width:100%;min-height:49px;border:1px solid #d6d2c8;border-radius:15px;padding:12px 14px;font:inherit}button{width:100%;min-height:49px;border:0;border-radius:15px;background:var(--copper);color:white;font-weight:900;margin-top:20px;cursor:pointer}.note{font-size:12px;color:var(--muted);margin-top:15px}.error{color:#b42318;font-size:13px;margin-top:12px;display:none}</style></head><body><main class="card"><div class="brand">LillyTech · OnboardFlow</div><h1>Acceso administrativo</h1><p class="sub">Solo usuarios autorizados pueden entrar.</p><label>Correo</label><input type="email" value="admin@lillytech.demo"><label>Contraseña</label><input id="password" type="password"><button onclick="login()">Ingresar</button><div id="error" class="error">Datos incorrectos.</div><div class="note">Prototipo: contraseña <strong>LillyTech2026</strong>.</div></main><script>function login(){if(document.getElementById('password').value==='LillyTech2026')location.href='admin.html';else document.getElementById('error').style.display='block'}</script></body></html>
